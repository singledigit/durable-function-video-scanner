AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Scanner - Lambda Durable Function triggered by S3 via EventBridge

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Timeout: 900
    MemorySize: 512
    Tracing: Active

Resources:
  # Single DynamoDB table for all scanner data
  ScannerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: scanner-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # S3 Bucket for uploads
  ScannerBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # SNS Topic for Rekognition job completion notifications
  RekognitionNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: rekognition-job-notifications

  # IAM Role for Rekognition to access S3 and publish to SNS
  RekognitionServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rekognition.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RekognitionS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub '${ScannerBucket.Arn}/*'
        - PolicyName: RekognitionSNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RekognitionNotificationTopic

  # Lambda Durable Function
  ScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: scanner-function
      CodeUri: src/scanner/
      Handler: index.handler
      Description: Scanner durable function triggered by S3 events
      AutoPublishAlias: live
      LoggingConfig:
        LogFormat: JSON
        ApplicationLogLevel: INFO
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: scanner
          POWERTOOLS_LOG_LEVEL: INFO
          SCANNER_TABLE: !Ref ScannerTable
          REKOGNITION_ROLE_ARN: !GetAtt RekognitionServiceRole.Arn
          REKOGNITION_SNS_TOPIC_ARN: !Ref RekognitionNotificationTopic
          BEDROCK_MODEL_ID: global.amazon.nova-2-lite-v1:0
      DurableConfig:
        ExecutionTimeout: 604800
        RetentionPeriodInDays: 30
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ScannerBucket
        - S3WritePolicy:
            BucketName: !Ref ScannerBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref ScannerTable
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
                - transcribe:TagResource
              Resource: '*'
            - Effect: Allow
              Action:
                - comprehend:DetectToxicContent
                - comprehend:DetectSentiment
                - comprehend:DetectPiiEntities
              Resource: '*'
            - Effect: Allow
              Action:
                - rekognition:StartTextDetection
                - rekognition:GetTextDetection
              Resource: '*'
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource: !GetAtt RekognitionServiceRole.Arn
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
      Events:
        S3ObjectCreated:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref ScannerBucket
                object:
                  key:
                    - prefix: raw/
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - index.ts

  # Unified Callback Function
  CallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: callback-function
      CodeUri: src/callback/
      Handler: index.handler
      Description: Unified callback handler for Transcribe, Rekognition, and Approval events
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: callback
          POWERTOOLS_LOG_LEVEL: INFO
          SCANNER_TABLE: !Ref ScannerTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ScannerTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:SendDurableExecutionCallbackSuccess
                - lambda:SendDurableExecutionCallbackFailure
              Resource: 
                - !GetAtt ScannerFunction.Arn
                - !Sub '${ScannerFunction.Arn}:*'
      Events:
        TranscribeComplete:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.transcribe
              detail-type:
                - Transcribe Job State Change
              detail:
                TranscriptionJobStatus:
                  - COMPLETED
                  - FAILED
        RekognitionSNS:
          Type: SNS
          Properties:
            Topic: !Ref RekognitionNotificationTopic
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - index.ts

Outputs:
  ScannerBucketName:
    Description: S3 Bucket for uploads
    Value: !Ref ScannerBucket
  
  ScannerFunctionArn:
    Description: Scanner Function ARN
    Value: !GetAtt ScannerFunction.Arn

  CallbackFunctionArn:
    Description: Unified Callback Function ARN
    Value: !GetAtt CallbackFunction.Arn

  ScannerTableName:
    Description: DynamoDB table for scanner data
    Value: !Ref ScannerTable
