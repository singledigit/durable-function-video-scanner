AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Scanner - Lambda Durable Function triggered by S3 via EventBridge

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Timeout: 900
    MemorySize: 512
    Tracing: Active

Resources:
  # DynamoDB table for callback tokens
  CallbackTokenTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: scanner-callback-tokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobName
          AttributeType: S
      KeySchema:
        - AttributeName: jobName
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # DynamoDB table for scan results
  ScanResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: scanner-results
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: scanId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: uploadedAt
          AttributeType: S
        - AttributeName: approvalStatus
          AttributeType: S
      KeySchema:
        - AttributeName: scanId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-uploadedAt-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: uploadedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: approvalStatus-uploadedAt-index
          KeySchema:
            - AttributeName: approvalStatus
              KeyType: HASH
            - AttributeName: uploadedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # S3 Bucket for uploads
  ScannerBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # SNS Topic for Rekognition job completion notifications
  RekognitionNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: rekognition-job-notifications

  # IAM Role for Rekognition to access S3 and publish to SNS
  RekognitionServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rekognition.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RekognitionS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub '${ScannerBucket.Arn}/*'
        - PolicyName: RekognitionSNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RekognitionNotificationTopic

  # Lambda Durable Function
  ScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: scanner-function
      CodeUri: src/scanner/
      Handler: index.handler
      Description: Scanner durable function triggered by S3 events
      AutoPublishAlias: live
      LoggingConfig:
        LogFormat: JSON
        ApplicationLogLevel: INFO
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: scanner
          POWERTOOLS_LOG_LEVEL: INFO
          CALLBACK_TOKEN_TABLE: !Ref CallbackTokenTable
          SCAN_RESULTS_TABLE: !Ref ScanResultsTable
          REKOGNITION_ROLE_ARN: !GetAtt RekognitionServiceRole.Arn
          REKOGNITION_SNS_TOPIC_ARN: !Ref RekognitionNotificationTopic
          BEDROCK_MODEL_ID: global.amazon.nova-2-lite-v1:0
      DurableConfig:
        ExecutionTimeout: 604800
        RetentionPeriodInDays: 30
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ScannerBucket
        - S3WritePolicy:
            BucketName: !Ref ScannerBucket
        - DynamoDBWritePolicy:
            TableName: !Ref CallbackTokenTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ScanResultsTable
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
                - transcribe:TagResource
              Resource: '*'
            - Effect: Allow
              Action:
                - comprehend:DetectToxicContent
                - comprehend:DetectSentiment
                - comprehend:DetectPiiEntities
              Resource: '*'
            - Effect: Allow
              Action:
                - rekognition:StartTextDetection
                - rekognition:GetTextDetection
              Resource: '*'
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource: !GetAtt RekognitionServiceRole.Arn
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
      Events:
        S3ObjectCreated:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref ScannerBucket
                object:
                  key:
                    - prefix: raw/
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - index.ts

  # Transcribe Callback Function
  TranscribeCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: transcribe-callback-function
      CodeUri: src/transcribe-callback/
      Handler: index.handler
      Description: Handles Transcribe completion events and sends callbacks
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: transcribe-callback
          POWERTOOLS_LOG_LEVEL: INFO
          CALLBACK_TOKEN_TABLE: !Ref CallbackTokenTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CallbackTokenTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:SendDurableExecutionCallbackSuccess
                - lambda:SendDurableExecutionCallbackFailure
              Resource: 
                - !GetAtt ScannerFunction.Arn
                - !Sub '${ScannerFunction.Arn}:*'
            - Effect: Allow
              Action:
                - transcribe:GetTranscriptionJob
              Resource: '*'
      Events:
        TranscribeComplete:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.transcribe
              detail-type:
                - Transcribe Job State Change
              detail:
                TranscriptionJobStatus:
                  - COMPLETED
                  - FAILED
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - index.ts

  # Rekognition Callback Function
  RekognitionCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rekognition-callback-function
      CodeUri: src/rekognition-callback/
      Handler: index.handler
      Description: Handles Rekognition completion events from SNS and sends callbacks
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: rekognition-callback
          POWERTOOLS_LOG_LEVEL: INFO
          CALLBACK_TOKEN_TABLE: !Ref CallbackTokenTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CallbackTokenTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:SendDurableExecutionCallbackSuccess
                - lambda:SendDurableExecutionCallbackFailure
              Resource: 
                - !GetAtt ScannerFunction.Arn
                - !Sub '${ScannerFunction.Arn}:*'
      Events:
        RekognitionSNS:
          Type: SNS
          Properties:
            Topic: !Ref RekognitionNotificationTopic
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - index.ts

  # Approval Callback Function
  ApprovalCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: approval-callback-function
      CodeUri: src/approval-callback/
      Handler: index.handler
      Description: Handles human approval decisions and sends callbacks
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: approval-callback
          POWERTOOLS_LOG_LEVEL: INFO
          CALLBACK_TOKEN_TABLE: !Ref CallbackTokenTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CallbackTokenTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:SendDurableExecutionCallbackSuccess
                - lambda:SendDurableExecutionCallbackFailure
              Resource: 
                - !GetAtt ScannerFunction.Arn
                - !Sub '${ScannerFunction.Arn}:*'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - index.ts

Outputs:
  ScannerBucketName:
    Description: S3 Bucket for uploads
    Value: !Ref ScannerBucket
  
  ScannerFunctionArn:
    Description: Scanner Function ARN
    Value: !GetAtt ScannerFunction.Arn

  RekognitionCallbackFunctionArn:
    Description: Rekognition Callback Function ARN
    Value: !GetAtt RekognitionCallbackFunction.Arn

  ApprovalCallbackFunctionArn:
    Description: Approval Callback Function ARN
    Value: !GetAtt ApprovalCallbackFunction.Arn

  ScanResultsTableName:
    Description: DynamoDB table for scan results
    Value: !Ref ScanResultsTable
